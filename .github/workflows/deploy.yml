name: deploy-books

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install jupyter-book

      - name: Build Index
        run: |
          jupyter-book build Index

      - name: Build Coding
        run: |
          jupyter-book build Coding

      - name: Build fMRI_Preprocessing
        run: |
          jupyter-book build fMRI_Preprocessing

      - name: Build Questionnaire
        run: |
          jupyter-book build Questionnaire

      - name: Prepare combined site
        run: |
          mkdir -p site/Coding
          mkdir -p site/fMRI_Preprocessing
          mkdir -p site/Questionnaire

          # Use Index as the main landing page at site root
          cp -R Index/_build/html/* site/

          # Put the other books in subfolders
          cp -R Coding/_build/html/* site/Coding/
          cp -R fMRI_Preprocessing/_build/html/* site/fMRI_Preprocessing/
          cp -R Questionnaire/_build/html/* site/Questionnaire/

          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4